<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hello World 🌍</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>Hello World!</h1>
        <p class="subtitle">My first website deployed with GitHub + Cloudflare Pages</p>
        
        <div class="card">
            <p>🚀 This page is being served from:</p>
            <ul>
                <li>Local folder → GitHub</li>
                <li>GitHub → Cloudflare Pages</li>
                <li>Cloudflare → The internet</li>
            </ul>
        </div>

        <button onclick="sayHello()">Say Hello 👋</button>
        
        <footer>
            <p>Made with ❤️ using GitHub Desktop + Cloudflare</p>
        </footer>
    </div>

    <script src="script.js"></script>
</body>
</html>
